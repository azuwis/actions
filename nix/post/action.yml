name: Install Nix and setup cache (post actions)
runs:
  using: composite
  steps:
    - name: Nix save pre
      shell: bash
      run: exec ${{ github.action_path }}/save.sh pre
    - uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      if: ${{ env.CACHE_NEED_UPDATE == 'yes' }}
      with:
        key: ${{ env.CACHE_KEY }}-${{ env.CURRENT_SYSTEM }}-${{ env.CACHE_TIMESTAMP }}
        path: |
          /nix/store
          /nix/var/nix/db
          /nix/var/nix/gcroots
          /nix/var/nix/profiles
          ~/.cache/nix
          ~/.local/state/nix
          ~/.nix-channels
          ~/.nix-defexpr
